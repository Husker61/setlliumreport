<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Stellium Report</title>
  <style>
    body { margin:0; font-family:'Segoe UI',system-ui,sans-serif; background:#0d0d0d; color:#e0e0e0; line-height:1.5; }
    .container { max-width:1480px; margin:40px auto; padding:0 20px; }
    .header { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; margin-bottom:20px; gap:20px; }
    h1 { color:#ff4d4d; font-size:3.5em; margin:0; letter-spacing:3px; text-shadow:0 2px 10px rgba(255,77,77,0.3); }
    .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
    .datetime { font-size:1.1em; color:#aaa; white-space:nowrap; }
    .last-refreshed { font-size:0.9em; color:#666; }
    .controls { display:flex; align-items:center; gap:10px; font-size:1.1em; }
    button { background:#333; color:#eee; border:1px solid #555; padding:8px 16px; border-radius:6px; cursor:pointer; }
    button:hover { background:#444; }
    label { color:#ccc; }
    select { background:#222; color:#eee; border:1px solid #444; padding:8px 12px; border-radius:6px; font-size:1em; cursor:pointer; }
    select:focus { outline:none; border-color:#ff4d4d; box-shadow:0 0 0 2px rgba(255,77,77,0.3); }
    .section { margin-bottom:80px; }
    .section h2 { font-size:2.4em; border-bottom:5px solid #333; padding-bottom:12px; margin-bottom:40px; color:#ffdd55; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:24px; }
    .card { background:#1a1a1a; border:2px solid transparent; border-image:linear-gradient(to right, #ff4d4d, #ffdd55) 1; border-radius:12px; padding:20px; box-shadow:0 4px 20px rgba(0,0,0,0.7); transition:all 0.3s ease; cursor:pointer; position:relative; overflow:hidden; }
    .card:hover { transform:translateY(-8px); box-shadow:0 12px 40px rgba(255,77,77,0.35); }
    .card:active { transform:scale(0.97); box-shadow:0 2px 10px rgba(255,77,77,0.5); }
    .source-label { font-size:1.1em; font-weight:bold; color:#ffdd55; background:rgba(255,221,85,0.12); padding:6px 12px; border-radius:6px; display:inline-block; margin-bottom:12px; border:1px solid rgba(255,221,85,0.4); text-transform:uppercase; letter-spacing:0.5px; }
    .card h3 { margin:0 0 10px 0; font-size:1.3em; color:#fff; }
    .card .date { font-size:0.85em; color:#888; margin-top:8px; }
    .loading, .error { text-align:center; padding:40px; font-size:1.2em; color:#888; }
    @media (max-width:768px) { .header { flex-direction:column; align-items:center; } .header-right { align-items:center; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>The Stellium Report</h1>
      <div class="header-right">
        <div class="datetime" id="current-datetime"></div>
        <div class="last-refreshed" id="last-refreshed"></div>
        <div class="controls">
          <label for="refreshInterval">Auto-refresh every:</label>
          <select id="refreshInterval">
            <option value="0">Off</option>
            <option value="600000" selected>10 min</option>
            <option value="1200000">20 min</option>
            <option value="1800000">30 min</option>
          </select>
          <button id="refresh-now">Refresh Now</button>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>U.S. News & Politics</h2>
      <div class="grid" id="us-grid"></div>
    </div>

    <div class="section">
      <h2>International News & Politics</h2>
      <div class="grid" id="int-grid"></div>
    </div>

    <div class="section">
      <h2>Technology</h2>
      <div class="grid" id="tech-grid"></div>
    </div>

    <div class="section">
      <h2>Science News</h2>
      <div class="grid" id="science-grid"></div>
    </div>
  </div>

  <script>
    function updateDateTime() {
      const now = new Date();
      const options = { year:'numeric', month:'long', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true, timeZoneName:'short' };
      document.getElementById('current-datetime').textContent = now.toLocaleString('en-US', options);
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    const feeds = {
      us: {
        right: [
          { url: 'https://moxie.foxnews.com/google-publisher/latest.xml', name: 'Fox News' },
          { url: 'https://www.newsmax.com/rss/Newsfront/16', name: 'Newsmax' }
        ],
        other: [
          { url: 'https://www.cbsnews.com/latest/rss/main', name: 'CBS News' },
          { url: 'http://feeds.nbcnews.com/nbcnews/public/news', name: 'NBC News' },
          { url: 'https://feeds.abcnews.com/abcnews/politicsheadlines', name: 'ABC News Politics' },
          { url: 'https://rss.cnn.com/rss/cnn_topstories.rss', name: 'CNN Top Stories' }, // Added from Feedspot
          { url: 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml', name: 'New York Times' }, // Added
          { url: 'https://www.politico.com/rss/politicopicks.xml', name: 'POLITICO' }, // Added
          { url: 'https://www.reuters.com/arc/outboundfeeds/top-headlines/?outputType=xml', name: 'Reuters' },
          { url: 'https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en', name: 'Google News (US)' },
          { url: 'https://afs.google.com/dp-ap/rss', name: 'AP News' },
          { url: 'https://feeds.npr.org/1001/rss.xml', name: 'NPR National' }
        ]
      },
      international: [
        { url: 'http://feeds.bbci.co.uk/news/rss.xml', name: 'BBC News' },
        { url: 'https://www.aljazeera.com/xml/rss/all.xml', name: 'Al Jazeera' },
        { url: 'https://www.reuters.com/arc/outboundfeeds/world/?outputType=xml', name: 'Reuters World' },
        { url: 'https://timesofindia.indiatimes.com/rssfeedstopstories.cms', name: 'Times of India' }
      ],
      tech: [
        { url: 'http://feeds.bbci.co.uk/news/technology/rss.xml', name: 'BBC Tech' },
        { url: 'https://techcrunch.com/feed/', name: 'TechCrunch' },
        { url: 'https://www.theverge.com/rss/index.xml', name: 'The Verge' },
        { url: 'https://arstechnica.com/feed/', name: 'Ars Technica' },
        { url: 'https://www.wired.com/feed/rss', name: 'WIRED' },
        { url: 'https://www.engadget.com/rss.xml', name: 'Engadget' }
      ],
      science: [
        { url: 'http://feeds.bbci.co.uk/news/science_and_environment/rss.xml', name: 'BBC Science' },
        { url: 'https://rss.sciam.com/ScientificAmerican-Global', name: 'Scientific American' },
        { url: 'https://www.nature.com/nature.rss', name: 'Nature' },
        { url: 'https://www.science.org/rss/news_current.xml', name: 'Science Magazine' }
      ]
    };

    const proxy = 'https://corsproxy.io/?';

    let refreshTimer = null;

    function parseRSS(xmlString) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlString, 'application/xml');
      const items = xml.querySelectorAll('item');
      return Array.from(items).map(item => ({
        title: item.querySelector('title')?.textContent || 'No title',
        link: item.querySelector('link')?.textContent || '',
        pubDate: item.querySelector('pubDate')?.textContent || ''
      }));
    }

    async function fetchFeed(url) {
      try {
        const res = await fetch(proxy + encodeURIComponent(url));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const xml = await res.text();
        return parseRSS(xml);
      } catch (err) {
        console.error(`Fetch error for ${url}:`, err);
        return [];
      }
    }

    function createCard(item, sourceName) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="source-label">${sourceName}</div>
        <h3>${item.title}</h3>
        <div class="date">${item.pubDate ? new Date(item.pubDate).toLocaleString() : 'No date'}</div>
      `;
      card.onclick = () => item.link && window.open(item.link, '_blank');
      return card;
    }

    async function loadSection(id, feedList, maxBlocks = 4) {
      const grid = document.getElementById(id);
      grid.innerHTML = '<div class="loading">Loading headlines...</div>';
      let items = [];

      if (id === 'us-grid') {
        // Force balance: top from right-leaning + top from others
        const rightItems = [];
        for (const f of feedList.right) {
          let feedItems = await fetchFeed(f.url);
          feedItems = feedItems.slice(0, 12).map(i => ({...i, source: f.name}));
          rightItems.push(...feedItems);
        }
        rightItems.sort((a,b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));
        const topRight = rightItems.slice(0, 5);

        const otherItems = [];
        for (const f of feedList.other) {
          let feedItems = await fetchFeed(f.url);
          feedItems = feedItems.slice(0, 8).map(i => ({...i, source: f.name}));
          otherItems.push(...feedItems);
        }
        otherItems.sort((a,b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));
        const topOther = otherItems.slice(0, 8);

        items = [...topRight, ...topOther];
      } else {
        // Standard for others
        for (const f of feedList) {
          let feedItems = await fetchFeed(f.url);
          feedItems = feedItems.slice(0, 8).map(i => ({...i, source: f.name}));
          items.push(...feedItems);
        }
      }

      grid.innerHTML = '';
      if (items.length === 0) {
        grid.innerHTML = '<div class="error">No headlines loaded (try Refresh Now or check console).</div>';
        return;
      }

      items.sort((a,b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));
      items.slice(0, maxBlocks).forEach(i => grid.appendChild(createCard(i, i.source)));
    }

    async function refreshAll() {
      await Promise.all([
        loadSection('us-grid', feeds.us, 8),
        loadSection('int-grid', feeds.international, 4),
        loadSection('tech-grid', feeds.tech, 4),
        loadSection('science-grid', feeds.science, 4)
      ]);
      document.getElementById('last-refreshed').textContent = 'Last refreshed: ' + new Date().toLocaleTimeString();
    }

    function startTimer(ms) {
      if (refreshTimer) clearInterval(refreshTimer);
      if (ms > 0) refreshTimer = setInterval(refreshAll, ms);
    }

    refreshAll();

    document.getElementById('refreshInterval').addEventListener('change', e => startTimer(parseInt(e.target.value, 10)));
    startTimer(parseInt(document.getElementById('refreshInterval').value, 10));

    document.getElementById('refresh-now').addEventListener('click', refreshAll);
  </script>
</body>
</html>
